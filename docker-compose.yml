version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: nova_mongodb
    ports:
      - "27017:27017"
    volumes:
      - nova_mongodb_data:/data/db
    restart: always

  redis:
    image: redis:latest
    container_name: nova_redis
    ports:
      - "6379:6379"
    volumes:
      - nova_redis_data:/data
    restart: always

  backend:
    build:
      context: ./backend
    container_name: nova_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/nova-leads
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=supersecretjwtkey_replace_me
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: nova_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next

volumes:
  nova_mongodb_data:
  nova_redis_data:
